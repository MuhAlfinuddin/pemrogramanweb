<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMEMADE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="loader" id="loader">
        <div class="loader-blob lb1"></div>
        <div class="loader-blob lb2"></div>
        <div class="loader-blob lb3"></div>

        <div class="ripple-wrap">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
        </div>
    
        <div class="koi-orbit">
            <svg class="orbit-svg" viewBox="0 0 170 170" fill="none">
              <circle cx="85" cy="85" r="78" stroke="rgba(96,165,250,0.12)" stroke-width="1" stroke-dasharray="4 8"/>
              <circle cx="85" cy="7" r="4" fill="#60a5fa" opacity=".9"/>
              <circle cx="85" cy="7" r="8" fill="#60a5fa" opacity=".2"/>
            </svg>

        <div class="koi-center">
            <img src="https://i.pinimg.com/736x/5a/49/4c/5a494c494b7a22207e66c6b783d0b916.jpg" alt="koi" class="koi-fish-img">
        </div>
        </div>

        <div class="loader-logo">PINN<span>KOII</span></div>
        <div class="loader-tagline">Futuristic Koi Experience</div>
        <div class="loader-progress-wrap">
        <div class="loader-progress-bar"></div>

        </div>
            <div class="loader-status"></div>
        </div>
    </div>

    <div class="gradient gradient1"></div>
    <div class="gradient gradient2"></div>

</body>
</html>
